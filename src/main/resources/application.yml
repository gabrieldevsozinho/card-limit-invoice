spring:
  application:
    name: card-limit-invoice

  datasource:
    url: jdbc:postgresql://localhost:5433/card_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6380

server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger-ui.html
