version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: card-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: card_db
    ports:
      - "5432:5432"
    volumes:
      - card_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: card-redis
    ports:
      - "6379:6379"

volumes:
  card_postgres_data:
